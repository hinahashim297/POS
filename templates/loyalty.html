{% extends "base.html" %}
{% block title %}Loyalty Points - POS System{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/loyalty.css') }}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="page-head">
        <div>
            <h2><i class="fas fa-gift me-2"></i>Loyalty Points</h2>
            <p>Manage customer loyalty points and rewards</p>
        </div>
        <button class="btn-add-loyalty" data-bs-toggle="modal" data-bs-target="#loyaltyModal" onclick="resetLoyaltyForm()">
            <i class="fas fa-plus"></i> Add Points
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light"><tr><th>Customer Name</th><th>Phone</th><th>Loyalty Points</th><th>Total Spent</th><th>Actions</th></tr></thead>
                    <tbody id="loyaltyList">...</tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Loyalty Modal -->
<div class="modal fade" id="loyaltyModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-gift"></i> Manage Points</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="loyaltyCustomerId">
                <div class="mb-3"><label>Customer</label><select id="loyaltyCustomer" class="form-select"></select></div>
                <div class="mb-3"><label>Points to Add</label><input type="number" id="loyaltyPoints" class="form-control" min="1"></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-warning" onclick="addLoyaltyPoints()">Add Points</button></div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/loyalty.js') }}"></script>
{% endblock %}
