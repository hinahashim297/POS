{% extends "base.html" %}

{% block title %}Forgot Password - POS System{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Forgot Password</h2>
        <p>Enter your email to reset password</p>
        
        <div id="message" class="alert" style="display: none;"></div>
        
        <form id="forgotForm" method="POST" action="{{ url_for('forgot_password_post') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                Send Reset Link
            </button>
        </form>
        
        <a href="{{ url_for('login') }}" class="back-link">← Back to Login</a>
    </div>
</div>

<script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
{% endblock %}
