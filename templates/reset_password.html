{% extends "base.html" %}

{% block title %}Reset Password - POS System{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/reset_password.css') }}">
{% endblock %}

{% block content %}
<div class="reset-wrap">
<div class="reset-card">
    <div class="reset-card-body">
        <div class="text-center">
            <div class="reset-icon"><i class="fas fa-key"></i></div>
            <h3>Set New Password</h3>
            <p class="text-muted">Create a new strong password for your account</p>
        </div>
        <form method="POST" action="{{ url_for('reset_password_post', token=token) }}">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter new password" required>
                <small class="text-muted" style="font-size:12px;">Minimum 6 characters</small>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn-reset mt-2">
                <i class="fas fa-lock me-2"></i>Reset Password
            </button>
        </form>
    </div>
</div>
</div><!-- /reset-wrap -->
{% endblock %}
