{% extends "base.html" %}
{% block title %}Promotions - POS System{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/promotions.css') }}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="page-head">
        <div>
            <h2><i class="fas fa-tags me-2"></i>Promotions & Discounts</h2>
            <p>Create and manage promotional offers and discount campaigns</p>
        </div>
        <button class="btn-add-promo" data-bs-toggle="modal" data-bs-target="#promotionModal" onclick="resetPromotionForm()">
            <i class="fas fa-plus"></i> Add Promotion
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light"><tr><th>Name</th><th>Discount</th><th>Start Date</th><th>End Date</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="promotionsList">...</tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Promotion Modal -->
<div class="modal fade" id="promotionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-tags"></i> Add Promotion</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="promotionId">
                <div class="mb-3"><label>Promotion Name *</label><input type="text" id="promotionName" class="form-control"></div>
                <div class="row"><div class="col-md-6"><label>Discount Type</label><select id="promotionType" class="form-select"><option value="percentage">Percentage (%)</option><option value="fixed">Fixed (PKR)</option></select></div>
                <div class="col-md-6"><label>Discount Value</label><input type="number" id="promotionValue" class="form-control" step="0.01"></div></div>
                <div class="row"><div class="col-md-6"><label>Start Date</label><input type="date" id="startDate" class="form-control"></div>
                <div class="col-md-6"><label>End Date</label><input type="date" id="endDate" class="form-control"></div></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success" onclick="savePromotion()">Save</button></div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/promotions.js') }}"></script>
{% endblock %}
